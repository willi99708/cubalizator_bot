name: diagnostics-v2

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Check GigaChat directly
        continue-on-error: true
        env:
          GIGACHAT_AUTH_KEY: ${{ secrets.GIGACHAT_AUTH_KEY }}
        run: |
          set -euo pipefail
          RQUID="$(python -c 'import uuid; print(uuid.uuid4())')"

          OAUTH="$(curl --insecure --silent --show-error --max-time 30 \
            --request POST \
            "https://ngw.devices.sberbank.ru:9443/api/v2/oauth" \
            --header "Authorization: Basic ${GIGACHAT_AUTH_KEY}" \
            --header "RqUID: ${RQUID}" \
            --header "Accept: application/json" \
            --header "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "scope=GIGACHAT_API_PERS")"

          TOKEN="$(echo "$OAUTH" | jq -r '.access_token // empty')"
          if [ -z "$TOKEN" ]; then
            echo "OAuth response:"
            echo "$OAUTH" | jq
            exit 1
          fi
          echo "GigaChat OAuth: OK"

          MODELS="$(curl --insecure --silent --show-error --max-time 30 \
            "https://gigachat.devices.sberbank.ru/api/v1/models" \
            --header "Authorization: Bearer ${TOKEN}" \
            --header "Accept: application/json")"
          echo "Available models:"
          echo "$MODELS" | jq -r '.data[]?.id'

          RESPONSE="$(curl --insecure --silent --show-error --max-time 45 \
            --request POST \
            "https://gigachat.devices.sberbank.ru/api/v1/chat/completions" \
            --header "Authorization: Bearer ${TOKEN}" \
            --header "Accept: application/json" \
            --header "Content-Type: application/json" \
            --data '{
              "model": "GigaChat-2-Max",
              "messages": [{"role":"user","content":"Ответь одним словом: столица России?"}],
              "temperature": 0.1,
              "max_tokens": 30,
              "stream": false
            }')"

          ANSWER="$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty')"
          if [ -z "$ANSWER" ]; then
            echo "Generation response:"
            echo "$RESPONSE" | jq
            exit 1
          fi
          echo "GigaChat answer: $ANSWER"

      - name: 2. Check Telegram API and outbound message
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.ALLOWED_CHAT_ID }}
        run: |
          set -euo pipefail
          curl --silent --show-error \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getMe" | \
            jq '{ok, id:.result.id, username:.result.username}'

          RESPONSE="$(curl --silent --show-error \
            --request POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${CHAT_ID}" \
            --data-urlencode "text=Диагностика v2: Telegram отправляет сообщения.")"
          echo "$RESPONSE" | jq '{ok, description, chat_id:.result.chat.id}'
          test "$(echo "$RESPONSE" | jq -r '.ok')" = "true"

      - name: 3. Check Yandex container health
        continue-on-error: true
        run: |
          set -euo pipefail
          curl --fail-with-body --silent --show-error --max-time 30 \
            "https://bba1vtooqk4h55qfm86p.containers.yandexcloud.net/health"
          echo

      - name: 4. Check Telegram webhook state
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          curl --silent --show-error \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getWebhookInfo" | jq

      - name: 5. Send synthetic /chatid update to container
        continue-on-error: true
        env:
          TELEGRAM_WEBHOOK_SECRET: ${{ secrets.TELEGRAM_WEBHOOK_SECRET }}
          CHAT_ID: ${{ secrets.ALLOWED_CHAT_ID }}
        run: |
          set -euo pipefail
          BODY="$(jq -n --argjson chat_id "$CHAT_ID" --argjson now "$(date +%s)" '{
            update_id: 999999002,
            message: {
              message_id: 999999002,
              date: $now,
              text: "/chatid",
              from: {id:999999002,is_bot:false,first_name:"Diagnostics"},
              chat: {id:$chat_id,type:"group",title:"Diagnostics"}
            }
          }')"

          curl --fail-with-body --silent --show-error --max-time 30 \
            --request POST \
            "https://bba1vtooqk4h55qfm86p.containers.yandexcloud.net/telegram/webhook/cubalizator-hook-v1" \
            --header "Content-Type: application/json" \
            --header "X-Telegram-Bot-Api-Secret-Token: ${TELEGRAM_WEBHOOK_SECRET}" \
            --data "$BODY"
          echo
