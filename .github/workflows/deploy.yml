name: deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run tests
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pytest -q

      - name: Login to Yandex Container Registry
        uses: yc-actions/yc-cr-login@v1
        with:
          yc-sa-json-credentials: ${{ secrets.YC_SA_JSON_CREDENTIALS }}

      - name: Build and push Docker image
        env:
          IMAGE: cr.yandex/crpe8ibsbb94euufdl94/cubalizator:${{ github.sha }}
        run: |
          docker build --platform linux/amd64 -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Deploy Yandex Serverless Container
        id: deploy_container
        uses: yc-actions/yc-sls-container-deploy@v4
        with:
          yc-sa-json-credentials: ${{ secrets.YC_SA_JSON_CREDENTIALS }}
          folder-id: ${{ secrets.YC_FOLDER_ID }}
          container-name: cubalizator
          public: true
          revision-service-account-id: ${{ secrets.YC_SERVICE_ACCOUNT_ID }}
          revision-image-url: cr.yandex/crpe8ibsbb94euufdl94/cubalizator:${{ github.sha }}
          revision-cores: 1
          revision-memory: 512Mb
          revision-core-fraction: 100
          revision-concurrency: 4
          revision-execution-timeout: 70
          revision-env: |
            TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
            BOT_USERNAME=cubalizator_bot
            TELEGRAM_WEBHOOK_SECRET=disabled
            WEBHOOK_PATH_SECRET=cubalizator-hook-v1
            ALLOWED_CHAT_ID=${{ secrets.ALLOWED_CHAT_ID }}
            ALLOW_REPLY_TO_BOT=false
            GIGACHAT_AUTH_KEY=${{ secrets.GIGACHAT_AUTH_KEY }}
            GIGACHAT_SCOPE=GIGACHAT_API_PERS
            GIGACHAT_MODEL=GigaChat-2-Max
            GIGACHAT_OAUTH_URL=https://ngw.devices.sberbank.ru:9443/api/v2/oauth
            GIGACHAT_CHAT_URL=https://gigachat.devices.sberbank.ru/api/v1/chat/completions
            GIGACHAT_VERIFY_SSL=false
            GIGACHAT_TIMEOUT_SECONDS=25
            MAX_ANSWER_CHARS=700

      - name: Check container health
        env:
          CONTAINER_ID: ${{ steps.deploy_container.outputs.id }}
        run: |
          set -euo pipefail
          for attempt in $(seq 1 10); do
            if curl --fail-with-body --silent --show-error \
              --max-time 30 \
              "https://${CONTAINER_ID}.containers.yandexcloud.net/health"; then
              echo
              exit 0
            fi
            sleep 5
          done
          exit 1

      - name: Generate API Gateway specification
        env:
          CONTAINER_ID: ${{ steps.deploy_container.outputs.id }}
          YC_SERVICE_ACCOUNT_ID: ${{ secrets.YC_SERVICE_ACCOUNT_ID }}
        run: |
          cat > apigw.generated.yaml <<EOF
          openapi: "3.0.0"
          info:
            title: CubaLizator Telegram Gateway
            version: "1.0.0"

          x-yc-apigateway:
            service_account_id: ${YC_SERVICE_ACCOUNT_ID}

          paths:
            /telegram/webhook/cubalizator-hook-v1:
              post:
                operationId: telegramWebhook
                x-yc-apigateway-integration:
                  type: serverless_containers
                  container_id: ${CONTAINER_ID}
                  service_account_id: ${YC_SERVICE_ACCOUNT_ID}
                responses:
                  "200":
                    description: Telegram update accepted
          EOF

          cat apigw.generated.yaml

      - name: Deploy API Gateway
        id: deploy_gateway
        uses: yc-actions/yc-api-gateway-deploy@v2
        with:
          yc-sa-json-credentials: ${{ secrets.YC_SA_JSON_CREDENTIALS }}
          gateway-name: cubalizator-gateway
          folder-id: ${{ secrets.YC_FOLDER_ID }}
          spec-file: apigw.generated.yaml

      - name: Wait for API Gateway
        env:
          GATEWAY_DOMAIN_RAW: ${{ steps.deploy_gateway.outputs.domain }}
        run: |
          set -euo pipefail

          DOMAIN="${GATEWAY_DOMAIN_RAW#https://}"
          DOMAIN="${DOMAIN#http://}"
          DOMAIN="${DOMAIN%/}"

          if [ -z "$DOMAIN" ]; then
            echo "API Gateway action returned an empty domain."
            exit 1
          fi

          echo "API Gateway domain: $DOMAIN"

          for attempt in $(seq 1 24); do
            if curl --silent --show-error \
              --output /dev/null \
              --max-time 10 \
              "https://${DOMAIN}/"; then
              echo "API Gateway HTTPS is ready."
              exit 0
            fi

            echo "Gateway is not ready yet: attempt ${attempt}/24"
            sleep 10
          done

          echo "API Gateway did not become reachable."
          exit 1

      - name: Reset and set Telegram webhook
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GATEWAY_DOMAIN_RAW: ${{ steps.deploy_gateway.outputs.domain }}
        run: |
          set -euo pipefail

          DOMAIN="${GATEWAY_DOMAIN_RAW#https://}"
          DOMAIN="${DOMAIN#http://}"
          DOMAIN="${DOMAIN%/}"

          WEBHOOK_URL="https://${DOMAIN}/telegram/webhook/cubalizator-hook-v1"
          echo "Webhook URL: ${WEBHOOK_URL}"

          DELETE_RESPONSE="$(curl --silent --show-error \
            --request POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/deleteWebhook" \
            --data-urlencode "drop_pending_updates=true")"

          echo "$DELETE_RESPONSE" | jq
          test "$(echo "$DELETE_RESPONSE" | jq -r '.ok')" = "true"

          for attempt in $(seq 1 12); do
            RESPONSE="$(curl --silent --show-error \
              --request POST \
              "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/setWebhook" \
              --data-urlencode "url=${WEBHOOK_URL}" \
              --data-urlencode 'allowed_updates=["message","edited_message"]' \
              --data-urlencode "drop_pending_updates=true")"

            echo "$RESPONSE" | jq

            if [ "$(echo "$RESPONSE" | jq -r '.ok')" = "true" ]; then
              exit 0
            fi

            echo "Telegram rejected the webhook: attempt ${attempt}/12"
            sleep 10
          done

          exit 1

      - name: Verify Telegram webhook
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GATEWAY_DOMAIN_RAW: ${{ steps.deploy_gateway.outputs.domain }}
        run: |
          set -euo pipefail

          DOMAIN="${GATEWAY_DOMAIN_RAW#https://}"
          DOMAIN="${DOMAIN#http://}"
          DOMAIN="${DOMAIN%/}"

          EXPECTED="https://${DOMAIN}/telegram/webhook/cubalizator-hook-v1"

          RESPONSE="$(curl --silent --show-error \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getWebhookInfo")"

          echo "$RESPONSE" | jq

          ACTUAL="$(echo "$RESPONSE" | jq -r '.result.url')"
          test "$ACTUAL" = "$EXPECTED"
